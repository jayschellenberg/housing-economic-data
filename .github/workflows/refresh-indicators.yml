name: Refresh Market Indicators (weekly)
on:
  schedule:
    # Weekly heartbeat — every Monday at 07:23 UTC. BoC + StatsCan update
    # often enough that monthly is too stale; pulling weekly keeps the
    # Market Indicators / Current Snapshot tabs near-current without
    # incurring the cost of the full CMHC scrape.
    - cron: "23 7 * * 1"
  workflow_dispatch:
    inputs:
      allow_shrink:
        description: "Bypass sanity-check shrink guard (use only when shrinkage is intentional)."
        required: false
        default: "0"
        type: choice
        options: ["0", "1"]

jobs:
  refresh-indicators:
    runs-on: ubuntu-latest
    timeout-minutes: 60
    permissions:
      contents: write
      issues: write
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 2

      - uses: r-lib/actions/setup-r@v2
        with:
          r-version: "release"
          # Posit Public Package Manager serves pre-compiled Linux binaries, so
          # install.packages() doesn't compile curl/httr/cmhc from source (which
          # was failing for lack of system libs and breaking the whole pipeline).
          use-public-rspm: true

      - name: Stamp run date
        id: stamp
        run: echo "date=$(date -u +%Y-%m-%d)" >> "$GITHUB_OUTPUT"

      - name: Install R packages
        run: |
          # cmhc: not used by the indicator scrapes themselves, but every script
          # sources r/lib/cmhc_helpers.R which builds its CMAS table from
          # cmhc::cmhc_cma_translation_data at load time — so it must be present
          # or the whole pipeline fails at the first Rscript.
          # No explicit repos= — it would override the RSPM binary repo that
          # use-public-rspm: true configured, forcing slow source compilation.
          install.packages(c("cmhc", "cansim", "httr", "dplyr", "tidyr",
                             "purrr", "readr", "jsonlite", "readxl", "rvest"))
        shell: Rscript {0}

      - name: Run indicators pipeline
        run: |
          Rscript r/13_validate_indicators.R
          Rscript r/10_scrape_boc.R
          Rscript r/11_scrape_statscan.R
          Rscript r/17_scrape_osb.R
          Rscript r/14_build_indicators.R
          Rscript r/16_scrape_mls.R
          Rscript r/15_build_economic_update.R

      - name: Sanity check (indicators shrink guard)
        env:
          REFRESH_ALLOW_SHRINK: ${{ inputs.allow_shrink || '0' }}
        # 98_sanity_check compares all metrics; rental/starts/secondary should
        # be unchanged (we didn't run their scrapes), and indicators get the
        # real shrink-tolerance check.
        run: Rscript r/98_sanity_check.R

      - name: Commit refreshed data if changed
        id: commit
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add web/public/data
          if git diff --staged --quiet; then
            echo "No indicator changes."
            echo "changed=false" >> "$GITHUB_OUTPUT"
          else
            git commit -m "data: indicators refresh (${{ steps.stamp.outputs.date }})"
            git push
            echo "changed=true" >> "$GITHUB_OUTPUT"
          fi

      - name: Email gate — success
        if: success() && steps.commit.outputs.changed == 'true'
        id: ok_email_gate
        env:
          MAIL_USERNAME: ${{ secrets.MAIL_USERNAME }}
          MAIL_PASSWORD: ${{ secrets.MAIL_PASSWORD }}
          MAIL_TO:       ${{ vars.MAIL_TO }}
        run: |
          if [ -z "$MAIL_USERNAME" ] || [ -z "$MAIL_PASSWORD" ] || [ -z "$MAIL_TO" ]; then
            echo "Email secrets/vars not configured — skipping notification."
            echo "send=false" >> "$GITHUB_OUTPUT"
          else
            echo "send=true" >> "$GITHUB_OUTPUT"
          fi
      - name: Send success email
        if: success() && steps.commit.outputs.changed == 'true' && steps.ok_email_gate.outputs.send == 'true'
        uses: dawidd6/action-send-mail@4226df7daafa6fc901a43789c49bf7ab309066e7 # v3.11.0
        with:
          server_address: ${{ vars.SMTP_HOST || 'smtp.gmail.com' }}
          server_port:    ${{ vars.SMTP_PORT || 587 }}
          secure:         true
          username:       ${{ secrets.MAIL_USERNAME }}
          password:       ${{ secrets.MAIL_PASSWORD }}
          from:           Housing & Economic Data <${{ secrets.MAIL_USERNAME }}>
          to:             ${{ vars.MAIL_TO }}
          subject:        "[Housing & Economic Data] Indicators refresh OK — ${{ steps.stamp.outputs.date }}"
          body: |
            The weekly indicators refresh completed and pushed new data to main.

            Trigger:  ${{ github.event_name }}
            Run log:  ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
            Commit:   ${{ github.server_url }}/${{ github.repository }}/commit/${{ github.sha }}

            Vercel will redeploy automatically from main.

      - name: Email gate — failure
        if: failure()
        id: fail_email_gate
        env:
          MAIL_USERNAME: ${{ secrets.MAIL_USERNAME }}
          MAIL_PASSWORD: ${{ secrets.MAIL_PASSWORD }}
          MAIL_TO:       ${{ vars.MAIL_TO }}
        run: |
          if [ -z "$MAIL_USERNAME" ] || [ -z "$MAIL_PASSWORD" ] || [ -z "$MAIL_TO" ]; then
            echo "Email secrets/vars not configured — skipping notification."
            echo "send=false" >> "$GITHUB_OUTPUT"
          else
            echo "send=true" >> "$GITHUB_OUTPUT"
          fi
      - name: Send failure email
        if: failure() && steps.fail_email_gate.outputs.send == 'true'
        uses: dawidd6/action-send-mail@4226df7daafa6fc901a43789c49bf7ab309066e7 # v3.11.0
        with:
          server_address: ${{ vars.SMTP_HOST || 'smtp.gmail.com' }}
          server_port:    ${{ vars.SMTP_PORT || 587 }}
          secure:         true
          username:       ${{ secrets.MAIL_USERNAME }}
          password:       ${{ secrets.MAIL_PASSWORD }}
          from:           Housing & Economic Data <${{ secrets.MAIL_USERNAME }}>
          to:             ${{ vars.MAIL_TO }}
          subject:        "[Housing & Economic Data] Indicators refresh FAILED — ${{ steps.stamp.outputs.date }}"
          body: |
            The weekly indicators refresh FAILED.

            Trigger:  ${{ github.event_name }}
            Run log:  ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
            Commit:   ${{ github.sha }}

      - name: Open issue on failure
        if: failure()
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh issue create \
            --title "Indicators refresh failed: ${{ steps.stamp.outputs.date }}" \
            --label "automation" \
            --body "$(cat <<'EOF'
          The scheduled \`Refresh Market Indicators (weekly)\` workflow failed.

          - Run: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
          - Trigger: ${{ github.event_name }}
          - Commit: ${{ github.sha }}

          Most common causes:
          1. **BoC Valet API outage** — `r/10_scrape_boc.R` failed.
          2. **StatsCan WDS outage** — `r/11_scrape_statscan.R` failed.
          3. **Series catalog drift** — `r/13_validate_indicators.R` rejected
             a series ID. Inspect the validation step output.
          4. **Indicators sanity-check shrink** — re-run via workflow_dispatch
             with `allow_shrink=1` if the shrink is intentional.
          EOF
          )" || echo "issue create failed (likely a duplicate or token scope) — continuing"
